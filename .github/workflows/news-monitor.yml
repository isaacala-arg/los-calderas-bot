name: News Monitor

on:
  schedule:
    - cron: "0 * * * *"   # cada hora (mantiene el tier gratuito de GitHub Actions)
  workflow_dispatch:

permissions:
  contents: write              # necesario para commitear seen_urls.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scripts/run_monitor.py

      - name: Commit updated seen URLs
        run: |
          git config user.name "Los Calderas Bot"
          git config user.email "bot@noreply.github.com"
          git add state/seen_urls.json
          git diff --staged --quiet || (git commit -m "chore: update seen URLs [skip ci]" && git push)
